<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Colección Épica: FNAF + Pokémon 🔥 Ryoko</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a050f 0%, #020108 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            padding: 12px;
        }

        .epic-collection {
            position: relative;
            width: 1400px;
            max-width: 100%;
            height: 90vh;
            min-height: 620px;
            background: radial-gradient(circle at 30% 40%, #1a1025, #05020a);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.8), inset 0 1px 2px rgba(255,255,255,0.08);
            overflow-y: auto;
            overflow-x: hidden;
            cursor: pointer;
            border: 2px solid rgba(255, 100, 80, 0.5);
            scrollbar-width: thin;
        }

        /* fondo con personajes diminutos (efecto loco) */
        .bg-craziness {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100%;
            z-index: 1;
            opacity: 0.2;
            pointer-events: none;
            font-size: 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            padding: 30px;
        }

        .bg-craziness span {
            margin: 6px;
            transform: rotate(var(--rot, -3deg));
        }

        /* contenedor de personajes clickeables (6 principales) */
        .mega-layer {
            position: relative;
            z-index: 20;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 40px 20px 180px 20px;
            pointer-events: none;
        }

        .mega-item {
            pointer-events: auto;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            border-radius: 48px;
            padding: 15px 18px;
            text-align: center;
            transition: all 0.25s ease;
            border: 1px solid rgba(255,120,80,0.6);
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            min-width: 110px;
        }

        .mega-item:active {
            transform: scale(0.94);
            background: rgba(0,0,0,0.7);
        }

        .mega-emoji {
            font-size: 70px;
            display: block;
            text-shadow: 0 0 20px #ff6644;
        }

        .mega-name {
            font-size: 13px;
            color: #ffccaa;
            margin-top: 8px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .message-panel {
            position: sticky;
            bottom: 15px;
            margin: 15px;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(20px);
            border-radius: 36px;
            padding: 16px 22px;
            color: #fff0e6;
            font-size: clamp(0.9rem, 4vw, 1.15rem);
            font-weight: 600;
            text-align: center;
            border: 1px solid rgba(255, 100, 80, 0.9);
            box-shadow: 0 10px 30px rgba(0,0,0,0.7), 0 0 35px rgba(255, 50, 50, 0.3);
            z-index: 45;
            max-height: 28vh;
            overflow-y: auto;
            line-height: 1.45;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        .romantic-text {
            font-size: clamp(0.85rem, 3.8vw, 1.1rem);
        }

        .poem-area {
            background: rgba(0, 0, 0, 0.9);
            border-radius: 32px;
            padding: 14px 18px;
            margin-top: 8px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            white-space: pre-line;
            font-size: clamp(0.8rem, 3.5vw, 0.98rem);
            max-height: 32vh;
            overflow-y: auto;
            line-height: 1.5;
            border: 1px solid rgba(255, 80, 80, 0.6);
        }

        .counter-badge {
            position: sticky;
            top: 15px;
            right: 20px;
            float: right;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            padding: 8px 20px;
            border-radius: 60px;
            font-weight: bold;
            color: #ffb090;
            font-family: monospace;
            font-size: 1rem;
            z-index: 50;
            border: 1px solid #ff7744;
            margin: 15px;
            display: inline-block;
            box-shadow: 0 2px 10px black;
        }

        .flex-header {
            display: flex;
            justify-content: flex-end;
            padding: 10px 20px 0 0;
        }

        @media (max-width: 780px) {
            .mega-emoji { font-size: 50px; }
            .mega-item { padding: 10px; min-width: 80px; }
            .mega-name { font-size: 10px; }
        }
    </style>
</head>
<body>
<div class="epic-collection" id="epicWorld">
    <div class="bg-craziness">
        <!-- Personajes FNAF + Pokémon en el fondo -->
        <span>🐻</span><span>🐰</span><span>🐥</span><span>🦊</span><span>👑</span><span>🧁</span>
        <span>🧸</span><span>🐇</span><span>🐤</span><span>🕷️</span><span>🎈</span><span>🎭</span>
        <span>👻</span><span>🐺</span><span>💀</span><span>🔥</span><span>🌙</span><span>🤖</span>
        <span>⚡</span><span>🔥</span><span>💧</span><span>🍃</span><span>🐉</span><span>🎲</span>
        <span>🧸</span><span>🐻‍❄️</span><span>🦊</span><span>🐕</span><span>🐈</span><span>🐉</span>
        <span>🌟</span><span>💀</span><span>🔪</span><span>🎸</span><span>🪦</span><span>🧸</span>
    </div>

    <div class="flex-header">
        <div class="counter-badge" id="epicCounter">🔥 0 / 6 💀</div>
    </div>

    <div class="mega-layer" id="megaLayer"></div>

    <div class="message-panel" id="messagePanel">
        <div class="romantic-text" id="msgText">🧸🔥 Toca cada personaje legendario (FNAF + Pokémon)… cada uno esconde una confesión salvaje para ti, Ryoko. 🔥💀⚡</div>
        <div id="poemDisplay" style="display: none;" class="poem-area"></div>
    </div>
</div>

<script>
    (function() {
        // 6 personajes representando la colección masiva: Freddy, Foxy, Mangle, Springtrap, Circus Baby, Pikachu + Pokéball
        const epicEmojis = ["🐻", "🦊", "🕷️", "💀", "🤖", "⚡"];
        const epicNames = ["Freddy + Golden Freddy", "Foxy & Phantom Foxy", "Mangle + The Puppet", "Springtrap & Scraptrap", "Circus Baby + Ennard", "Pikachu + Pokéball"];
        
        // Mensajes súper locos y pasionales (con control y entrega)
        const epicMessages = [
            "🔥 Ryoko, todos los animatrónicos se quedan helados cuando caminas. Freddy, Bonnie, Chica, incluso Golden Freddy saben que eres tú la que controla mi corazón. Me encanta cuando me dejas tomar la iniciativa y siento cómo tu cuerpo se entrega. Tu sonrisa enciende la pista de baile y la luna se rinde ante ti. Eres mi cupcake prohibido. 💜💀",
            "🦊 Foxy y sus fantasmas se esconden, pero yo no puedo esconder lo que siento. Ryoko, esa mirada tuya cuando digo 'quieta' me desarma. Tu risa hace que los phantom animatronics bailen de alegría. Me fascina cómo te abandonas al placer de ser dominada. Tus labios son mi botín favorito. Te adoro mi loba. 🌙🔥",
            "🕷️ Mangle, el Puppet y todo el FNaF 2 saben que eres única. Ryoko, cuando ríes, los withered se alegran. Tu belleza es como un rompecabezas que desarmo noche a noche. Me encanta cómo me dejas atarte suavemente a mi voluntad. Eres mi Marioneta favorita, mi show eterno. 💋🎭",
            "💀 Springtrap, Scraptrap y todos los phantoms aplauden tu belleza gótica. Ryoko, tus caderas son como una atracción mortal. Cuando susurro en tu oído y siento que tiemblas, los muertos vivientes nos envidian. Tu sonrisa podría revivir a los animatronics rotos. Eres mi pesadilla favorita, mi amor eterno. 🔥🧸",
            "🤖 Circus Baby, Ballora, Funtime Freddy y Ennard se quedan callados cuando tú apareces. Ryoko, tu cuerpo es una máquina perfecta de placer. Me encanta cómo cierras los ojos cuando tomo el mando y cómo tu risa llena toda la galería. Eres mi estrella de Sister Location, mi juego favorito. TE AMO con todos los circuitos. 💜🤖",
            "⚡ Pikachu, Charmander y todos los Pokémon se electrocutan al ver tu sonrisa. Ryoko, eres mi Pokéball dorada. Me fascina cuando dices 'haz lo que quieras' porque sabes que siempre te voy a cuidar y adorar. Tu cuerpo es mi gimnasio, tus gemidos mi música. Esta Pokéball te atrapó para siempre. A+R = FOREVER 🔥⚡💀"
        ];

        const wildPoem = `💀🔥 RYOKO, MI LEYENDA PROHIBIDA 🔥💀

En el museo de los animatrónicos rotos,
apareciste tú con una sonrisa que paraliza a Springtrap.
Tus ojos como dos Phantom Shadows,
tu boca como un cupcake endemoniado que quiero morder.

Ryoko, me encanta cómo cedes el control,
cómo tu risa se mezcla con el ruido de las máquinas viejas.
Eres más adictiva que cualquier juego de Freddy,
más letal que Ennard, más dulce que Ballora.

Cuando cierro los ojos veo tu silueta entre los withered,
y todos los Pokémon se quedan en sus balls mirando.
Tu belleza congela a los phantoms y derrite mi pecho,
eres mi gimnasio, mi noche en la pizzería, mi recompensa.

Las estrellas del cielo se apagan si tú no sonríes,
la luna se esconde porque tu brillo la avergüenza.
Cada vez que me dejas tomar las riendas
siento que el universo entero se rinde a tus piernas.

Eres mi Circus Baby, mi Mangle, mi Pokéball eterna,
no necesito más personajes, solo tu boquita que me gobierna.
A + R = FOREVER, lo grabo en cada arcade,
porque eres mi colección completa, mi más salvaje upgrade.

🔥💜 TE AMO RYOKO, MI CONTROL, MI LOCURA, MI JUEGO INFINITO 💀🌙`;

        let itemsClicked = 0;
        let poemRevealed = false;
        const counterSpan = document.getElementById("epicCounter");
        const msgTextDiv = document.getElementById("msgText");
        const poemDisplayDiv = document.getElementById("poemDisplay");
        const container = document.getElementById("epicWorld");

        function createEpicItems() {
            const layer = document.getElementById("megaLayer");
            layer.innerHTML = "";
            for(let i = 0; i < 6; i++) {
                const card = document.createElement("div");
                card.className = "mega-item";
                card.setAttribute("data-idx", i);
                card.innerHTML = `
                    <div class="mega-emoji">${epicEmojis[i]}</div>
                    <div class="mega-name">${epicNames[i]}</div>
                `;
                card.addEventListener("click", (e) => {
                    e.stopPropagation();
                    handleEpicClick(i, card);
                });
                layer.appendChild(card);
            }
        }

        function handleEpicClick(idx, element) {
            if(element.getAttribute("data-clicked") === "true") {
                msgTextDiv.innerHTML = `💀 Ryoko, ya liberaste a este personaje... atrapa otro de la colección épica 🔥⚡`;
                return;
            }
            element.setAttribute("data-clicked", "true");
            itemsClicked++;
            counterSpan.innerHTML = `🔥 ${itemsClicked} / 6 💀`;
            
            const spicyMsg = epicMessages[idx];
            msgTextDiv.innerHTML = `🌙💀🔥 ${spicyMsg} 🔥💀🌙`;
            
            element.style.transform = "scale(0.88)";
            element.style.opacity = "0.6";
            element.style.filter = "grayscale(0.3)";
            element.style.pointerEvents = "none";
            setTimeout(() => { element.style.transform = ""; }, 200);
            
            if(itemsClicked === 6 && !poemRevealed) {
                revealEpicPoem();
            }
        }

        function revealEpicPoem() {
            if(poemRevealed) return;
            poemRevealed = true;
            msgTextDiv.style.display = "none";
            poemDisplayDiv.style.display = "block";
            poemDisplayDiv.innerHTML = `<div style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-style: normal; font-weight: 500; text-align: center; line-height: 1.5; font-size: 0.85rem;">${wildPoem.replace(/\n/g, '<br>')}</div><br><div style="text-align:center; font-size:0.95rem; font-family: monospace;">🎮 A + R = FOREVER EN CADA JUEGO 🔥<br>💜 TE AMO RYOKO, MI LEYENDA VIVA 💜</div>`;
            counterSpan.style.background = "#b0305edd";
            counterSpan.innerHTML = "💀 COLECCIÓN COMPLETA 🔥";
            for(let i=0;i<30;i++) {
                setTimeout(() => createEpicSpark(), i*70);
            }
        }

        function createEpicSpark() {
            const spark = document.createElement("div");
            spark.innerText = ["🔥💀","🎲💜","🤖⚡","🧸❤️"][Math.floor(Math.random()*4)];
            spark.style.position = "absolute";
            spark.style.fontSize = 26 + Math.random() * 28 + "px";
            spark.style.left = Math.random() * 100 + "%";
            spark.style.bottom = "0px";
            spark.style.pointerEvents = "none";
            spark.style.zIndex = "200";
            spark.style.opacity = "0.9";
            spark.style.transition = "all 3.5s ease-out";
            container.appendChild(spark);
            requestAnimationFrame(() => {
                spark.style.transform = `translateY(-${window.innerHeight * 0.8}px) rotate(15deg)`;
                spark.style.opacity = "0";
            });
            setTimeout(() => spark.remove(), 3500);
        }

        function addGlobalRipple(e) {
            const rect = container.getBoundingClientRect();
            const rippleDiv = document.createElement("div");
            rippleDiv.innerText = "🔥💀⚡";
            rippleDiv.style.position = "absolute";
            rippleDiv.style.left = (e.clientX - rect.left) + "px";
            rippleDiv.style.top = (e.clientY - rect.top) + "px";
            rippleDiv.style.fontSize = "34px";
            rippleDiv.style.pointerEvents = "none";
            rippleDiv.style.zIndex = "200";
            rippleDiv.style.transform = "translate(-50%, -50%)";
            rippleDiv.style.opacity = "0.9";
            rippleDiv.style.whiteSpace = "nowrap";
            rippleDiv.style.transition = "all 0.7s ease-out";
            container.appendChild(rippleDiv);
            setTimeout(() => {
                rippleDiv.style.opacity = "0";
                rippleDiv.style.transform = "translate(-50%, -50%) scale(1.7)";
                setTimeout(() => rippleDiv.remove(), 800);
            }, 30);
        }

        createEpicItems();
        container.addEventListener("click", (e) => {
            if(e.target === container || e.target.classList.contains("bg-craziness") || e.target.classList.contains("epic-collection")) {
                addGlobalRipple(e);
            }
        });
        container.addEventListener("touchstart", (e) => {
            if(e.target === container || e.target.classList.contains("bg-craziness") || e.target.classList.contains("epic-collection")) {
                const touch = e.touches[0];
                addGlobalRipple(touch);
            }
        });
    })();
</script>
</body>
</html>
